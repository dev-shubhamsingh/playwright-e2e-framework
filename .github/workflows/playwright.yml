name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  # ── Type-check: shared gate, runs first ──────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ── UI suite (Chromium) ───────────────────────────────────────────────────
  test-ui:
    name: UI — Chromium
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run UI suite (login + authenticated)
        run: npx playwright test --project=login --project=authenticated

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-ui
          path: allure-results/
          retention-days: 14

  # ── API suite (no browser) ────────────────────────────────────────────────
  test-api:
    name: API — DummyJSON
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # API tests use Playwright's request fixture — no browser needed.
      - run: npx playwright install --with-deps chromium

      - name: Run API suite
        run: npx playwright test --project=api

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 14

  # ── Contract suite (Pact, Jest) ───────────────────────────────────────────
  test-contract:
    name: Contract — Pact
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run Pact consumer contract suite
        run: npm run test:contract

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: pacts
          path: pacts/
          retention-days: 14

  # ── Accessibility suite (axe-core, Chromium) ──────────────────────────────
  test-a11y:
    name: Accessibility — axe-core
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run accessibility suite
        run: npm run test:a11y

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-a11y
          path: allure-results/
          retention-days: 14

  # ── Cross-browser matrix: scheduled + manual only ─────────────────────────
  cross-browser:
    name: Cross-browser (${{ matrix.project }})
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [firefox, webkit, mobile-chrome, mobile-safari]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Run ${{ matrix.project }} suite
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14
